{% extends "base.html" %}
{% block title %}Create User — Smart College System{% endblock %}
{% block page_title %}Create New User{% endblock %}

{% block content %}
<div class="form-card">
    <h3><i class="fas fa-user-plus me-2" style="color: var(--accent);"></i>Create New User Account</h3>
    <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">
        <i class="fas fa-info-circle"></i> Users created here are <strong>auto-approved</strong> and can login immediately.
    </p>

    <form method="POST" action="{{ url_for('auth.admin_register') }}" id="registerForm">
        <div class="form-row mb-3">
            <div>
                <label class="form-label" for="username">Username</label>
                <input type="text" class="form-control" id="username" name="username" required minlength="3">
            </div>
            <div>
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
        </div>

        <div class="form-row mb-3">
            <div>
                <label class="form-label" for="password">Password</label>
                <input type="password" class="form-control" id="password" name="password" required minlength="8">
            </div>
            <div>
                <label class="form-label" for="confirm_password">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="role">Role</label>
            <select class="form-select" id="role" name="role" required>
                <option value="student">Student</option>
                <option value="faculty">Faculty</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-user-plus"></i> Create User
            </button>
            <a href="{{ url_for('dashboard.index') }}" class="btn btn-outline-primary">
                <i class="fas fa-arrow-left"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
