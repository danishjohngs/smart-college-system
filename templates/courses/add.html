{% extends "base.html" %}
{% block title %}Add Course — Smart College System{% endblock %}
{% block page_title %}Add Course{% endblock %}

{% block content %}
<div class="form-card">
    <h3><i class="fas fa-plus-circle me-2" style="color: var(--accent);"></i>New Course</h3>
    <form method="POST" action="{{ url_for('courses.add_course') }}">
        <div class="form-row mb-3">
            <div><label class="form-label">Course Code *</label><input type="text" class="form-control" name="code" placeholder="e.g., CS501" required></div>
            <div><label class="form-label">Course Name *</label><input type="text" class="form-control" name="name" required></div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Department *</label>
                <select class="form-select" name="department" required>
                    <option value="">Select</option>
                    {% for dept in departments %}<option value="{{ dept }}">{{ dept }}</option>{% endfor %}
                </select>
            </div>
            <div><label class="form-label">Semester *</label>
                <select class="form-select" name="semester" required>
                    {% for s in range(1,9) %}<option value="{{ s }}">Semester {{ s }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Credits</label><input type="number" class="form-control" name="credits" value="3" min="1" max="6"></div>
            <div><label class="form-label">Assigned Faculty</label>
                <select class="form-select" name="faculty_id">
                    <option value="">None</option>
                    {% for fac in faculty_list %}<option value="{{ fac.id }}">{{ fac.name }} ({{ fac.department }})</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
            <a href="{{ url_for('courses.list_courses') }}" class="btn btn-outline-primary"><i class="fas fa-arrow-left"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
