{% extends "base.html" %}
{% block title %}Edit Course — Smart College System{% endblock %}
{% block page_title %}Edit Course{% endblock %}

{% block content %}
<div class="form-card">
    <h3><i class="fas fa-edit me-2" style="color: var(--accent);"></i>Edit — {{ course.code }}: {{ course.name }}</h3>
    <form method="POST" action="{{ url_for('courses.edit_course', id=course.id) }}">
        <div class="form-row mb-3">
            <div><label class="form-label">Course Code *</label><input type="text" class="form-control" name="code" value="{{ course.code }}" required></div>
            <div><label class="form-label">Course Name *</label><input type="text" class="form-control" name="name" value="{{ course.name }}" required></div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Department *</label>
                <select class="form-select" name="department" required>
                    {% for dept in departments %}<option value="{{ dept }}" {% if course.department == dept %}selected{% endif %}>{{ dept }}</option>{% endfor %}
                </select>
            </div>
            <div><label class="form-label">Semester *</label>
                <select class="form-select" name="semester" required>
                    {% for s in range(1,9) %}<option value="{{ s }}" {% if course.semester == s %}selected{% endif %}>Semester {{ s }}</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Credits</label><input type="number" class="form-control" name="credits" value="{{ course.credits }}" min="1" max="6"></div>
            <div><label class="form-label">Assigned Faculty</label>
                <select class="form-select" name="faculty_id">
                    <option value="">None</option>
                    {% for fac in faculty_list %}<option value="{{ fac.id }}" {% if course.faculty_id == fac.id %}selected{% endif %}>{{ fac.name }} ({{ fac.department }})</option>{% endfor %}
                </select>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button>
            <a href="{{ url_for('courses.list_courses') }}" class="btn btn-outline-primary"><i class="fas fa-arrow-left"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
