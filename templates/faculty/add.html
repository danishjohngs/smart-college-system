{% extends "base.html" %}
{% block title %}Add Faculty — Smart College System{% endblock %}
{% block page_title %}Add Faculty{% endblock %}

{% block content %}
<div class="form-card">
    <h3><i class="fas fa-user-plus me-2" style="color: var(--accent);"></i>New Faculty Member</h3>
    <form method="POST" action="{{ url_for('faculty.add_faculty') }}">
        <div class="form-row mb-3">
            <div><label class="form-label">Full Name *</label><input type="text" class="form-control" name="name" required></div>
            <div><label class="form-label">Employee ID *</label><input type="text" class="form-control" name="employee_id" required></div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Email</label><input type="email" class="form-control" name="email"></div>
            <div><label class="form-label">Phone</label><input type="text" class="form-control" name="phone"></div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Department *</label>
                <select class="form-select" name="department" required>
                    <option value="">Select</option>
                    {% for dept in departments %}<option value="{{ dept }}">{{ dept }}</option>{% endfor %}
                </select>
            </div>
            <div><label class="form-label">Designation</label><input type="text" class="form-control" name="designation" placeholder="e.g., Assistant Professor"></div>
        </div>
        <div class="mb-3"><label class="form-label">Qualification</label><input type="text" class="form-control" name="qualification" placeholder="e.g., M.Tech, PhD"></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save</button>
            <a href="{{ url_for('faculty.list_faculty') }}" class="btn btn-outline-primary"><i class="fas fa-arrow-left"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
