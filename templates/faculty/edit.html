{% extends "base.html" %}
{% block title %}Edit Faculty — Smart College System{% endblock %}
{% block page_title %}Edit Faculty{% endblock %}

{% block content %}
<div class="form-card">
    <h3><i class="fas fa-edit me-2" style="color: var(--accent);"></i>Edit — {{ faculty.name }}</h3>
    <form method="POST" action="{{ url_for('faculty.edit_faculty', id=faculty.id) }}">
        <div class="form-row mb-3">
            <div><label class="form-label">Full Name *</label><input type="text" class="form-control" name="name" value="{{ faculty.name }}" required></div>
            <div><label class="form-label">Employee ID *</label><input type="text" class="form-control" name="employee_id" value="{{ faculty.employee_id }}" required></div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Email</label><input type="email" class="form-control" name="email" value="{{ faculty.email or '' }}"></div>
            <div><label class="form-label">Phone</label><input type="text" class="form-control" name="phone" value="{{ faculty.phone or '' }}"></div>
        </div>
        <div class="form-row mb-3">
            <div><label class="form-label">Department *</label>
                <select class="form-select" name="department" required>
                    {% for dept in departments %}<option value="{{ dept }}" {% if faculty.department == dept %}selected{% endif %}>{{ dept }}</option>{% endfor %}
                </select>
            </div>
            <div><label class="form-label">Designation</label><input type="text" class="form-control" name="designation" value="{{ faculty.designation or '' }}"></div>
        </div>
        <div class="mb-3"><label class="form-label">Qualification</label><input type="text" class="form-control" name="qualification" value="{{ faculty.qualification or '' }}"></div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Update</button>
            <a href="{{ url_for('faculty.list_faculty') }}" class="btn btn-outline-primary"><i class="fas fa-arrow-left"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
