{% extends "base.html" %}
{% block title %}Add Student — Smart College System{% endblock %}
{% block page_title %}Add New Student{% endblock %}

{% block content %}
<div class="form-card">
    <h3><i class="fas fa-user-plus me-2" style="color: var(--accent);"></i>Student Registration</h3>

    <form method="POST" action="{{ url_for('students.add_student') }}" id="addStudentForm">
        <div class="form-row mb-3">
            <div>
                <label class="form-label" for="name">Full Name *</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div>
                <label class="form-label" for="roll_number">Roll Number *</label>
                <input type="text" class="form-control" id="roll_number" name="roll_number" required>
            </div>
        </div>

        <div class="form-row mb-3">
            <div>
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>
            <div>
                <label class="form-label" for="phone">Phone</label>
                <input type="text" class="form-control" id="phone" name="phone">
            </div>
        </div>

        <div class="form-row mb-3">
            <div>
                <label class="form-label" for="department">Department *</label>
                <select class="form-select" id="department" name="department" required>
                    <option value="">Select Department</option>
                    {% for dept in departments %}
                    <option value="{{ dept }}">{{ dept }}</option>
                    {% endfor %}
                </select>
            </div>
            <div>
                <label class="form-label" for="semester">Semester *</label>
                <select class="form-select" id="semester" name="semester" required>
                    {% for s in range(1, 9) %}
                    <option value="{{ s }}">Semester {{ s }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row mb-3">
            <div>
                <label class="form-label" for="admission_year">Admission Year</label>
                <input type="number" class="form-control" id="admission_year" name="admission_year" value="2024" min="2015" max="2030">
            </div>
            <div>
                <label class="form-label" for="date_of_birth">Date of Birth</label>
                <input type="date" class="form-control" id="date_of_birth" name="date_of_birth">
            </div>
        </div>

        <div class="form-row mb-3">
            <div>
                <label class="form-label" for="gender">Gender</label>
                <select class="form-select" id="gender" name="gender">
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <div></div>
        </div>

        <div class="mb-3">
            <label class="form-label" for="address">Address</label>
            <textarea class="form-control" id="address" name="address" rows="2"></textarea>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Save Student</button>
            <a href="{{ url_for('students.list_students') }}" class="btn btn-outline-primary"><i class="fas fa-arrow-left"></i> Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
